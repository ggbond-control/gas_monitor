serial_gas_node:
  ros__parameters:
    serial_port: /dev/ttyUSB0
    baud_rate: 9600
    parity: "none" # none/even/odd
    poll_interval_ms: 1000
    startup_timeout_seconds: 120
    fail_on_startup_timeout: false
    inter_request_delay_ms: 500
    response_timeout_ms: 1000
    alarm_repeat_seconds: 10
    temperature_offset_raw: 0 # 当前实机温度编码为raw/10，如遵循手册偏移编码设为500
    max_retries_per_slave: 3
    debug_hex: true
    slave_ids: [1, 2, 3, 4, 5, 6]
